slug: cursor-llm
title: "Свой LLM для Cursor"
subtitle: "Запустите Qwen 2.5 Coder 32B на облачном GPU и подключите как кастомную модель в Cursor"
sort_order: 20

# Customer app uses these to pick a matching Vast.ai offer at launch time.
# v1 ships Qwen 2.5 Coder 32B in AWQ INT4 — fits a single 24 GB card
# (RTX 4090, RTX A6000) at ~22 GB peak. Higher-quality fp8 / fp16 variants
# are a knob we may flip post-launch once we see whether the AWQ quality
# is "actually usable in Cursor" or just "demo-grade".
template_slug: vllm
min_vram_gb: 24
recommended_gpus:
  - rtx-4090
  - rtx-a6000
  - a100-sxm4
  - h100-sxm

# An LLM session is "however long you have Cursor open" — way longer than
# image-gen. Surface this honestly: the typical user wants this running for
# the work day, which is materially more expensive than the Comfy tutorial.
# 4 hours is the conservative recommended-top-up calculator hint, not a cap.
expected_session_minutes: 240

# Provisioning stages reported by provision.sh via /api/agent/provision.
# script_sha pins the exact provision.sh revision the onstart wrapper
# fetches at boot — bump it after merging changes to provision.sh.
# `main` is a fallback the customer app uses when this is unset; in
# production we always pin to a SHA so two concurrent rollouts can't
# disagree about what got provisioned.
provisioning:
  script_sha: "main"
  stages:
    - id: install_runtime
      label_ru: "Готовим vLLM и cloudflared"
      estimated_seconds: 60
    - id: download_model
      label_ru: "Скачиваем Qwen 2.5 Coder 32B AWQ (~20 ГБ)"
      estimated_seconds: 360
      with_progress: true
    - id: start_server
      label_ru: "Запускаем vLLM на порту 8000"
      estimated_seconds: 120
    - id: open_tunnel
      label_ru: "Открываем HTTPS-туннель для Cursor"
      estimated_seconds: 20

entrypoint:
  type: api
  # Internal vLLM port. The frontend never opens this directly — Cursor
  # connects through the Cloudflare quick tunnel URL that provision.sh
  # reports back at the open_tunnel stage. The customer app reads
  # provision_state.tunnel_url for the "Base URL" copy card.
  port: 8000
  scheme: https
  cta_label_ru: "Скопировать настройки для Cursor"
  ready_check:
    # No browser-side polling: the entrypoint is on a third-party
    # cloudflared subdomain we can't CORS-poll from app.cloudcompute.ru,
    # and provision.sh's own wait-for-port + tunnel-up loop is the
    # authoritative ready signal anyway.
    type: provision_marker

  # api-specific metadata read by the customer-app api-entrypoint card.
  # Surfaced verbatim in the "How to add to Cursor" guide so we don't
  # have to hardcode model names in the frontend translation strings.
  api:
    # Cursor's "Add model" dialog wants the full base URL up to (and
    # including) /v1. provision.sh reports the tunnel root URL; the
    # frontend appends this suffix when rendering the Base URL card.
    base_url_suffix: "/v1"
    # The OpenAI-compatible API key header value. Cursor sends it as
    # `Authorization: Bearer <key>`. The actual value is generated by
    # provision.sh and posted back; this field is purely descriptive
    # (used as the copy-card label).
    api_key_label_ru: "Cursor API ключ"

seo:
  description: "Запустите Qwen 2.5 Coder 32B как OpenAI-совместимый API на собственном GPU и подключите к Cursor через HTTPS-туннель. Без отправки кода в сторонние сервисы."
  schema_type: HowTo
  total_time_minutes: 10
  cost_estimate: "≈80 ₽/час"

screenshots:
  hero: screenshots/hero.jpg
  gallery: []
  ui: screenshots/cursor-settings.jpg
